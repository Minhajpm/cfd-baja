<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFD Study Roadmap – Baja SAE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0800;
    --panel: #12100a;
    --border: #2a2010;
    --accent: #ff9500;
    --accent2: #00cfff;
    --accent3: #7fff00;
    --text: #d8cdb8;
    --dim: #605040;
    --glow: 0 0 20px rgba(255,149,0,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(255,149,0,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,149,0,0.025) 1px, transparent 1px);
    background-size:44px 44px;
    pointer-events:none;
    z-index:0;
  }
  .container { max-width:920px; margin:0 auto; padding:40px 20px; position:relative; z-index:1; }

  /* HEADER */
  .header { text-align:center; margin-bottom:44px; }
  .header-tag { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--accent); letter-spacing:4px; margin-bottom:10px; opacity:0; animation:fadeUp .5s ease forwards; }
  .header h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,11vw,96px); letter-spacing:6px; line-height:1; color:#fff; opacity:0; animation:fadeUp .5s .1s ease forwards; }
  .header h1 span { color:var(--accent); text-shadow:var(--glow); }
  .header-sub { font-size:12px; color:var(--dim); letter-spacing:2px; margin-top:10px; font-family:'Share Tech Mono',monospace; opacity:0; animation:fadeUp .5s .2s ease forwards; }

  /* PROGRESS */
  .progress-wrap { opacity:0; animation:fadeUp .5s .3s ease forwards; margin-bottom:6px; }
  .progress-bar { background:var(--border); height:3px; border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); width:0%; transition:width .5s ease; box-shadow:0 0 10px var(--accent); }
  .progress-label { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--dim); display:flex; justify-content:space-between; margin-top:7px; }
  .progress-label em { color:var(--accent); font-style:normal; }

  /* PHASE HEADER */
  .phase-header { display:flex; align-items:center; gap:14px; margin:38px 0 14px; opacity:0; animation:fadeUp .4s ease forwards; }
  .phase-label { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:4px; padding:4px 12px; border:1px solid currentColor; white-space:nowrap; }
  .phase-label.p1 { color:var(--accent2); border-color:var(--accent2); background:rgba(0,207,255,0.05); }
  .phase-label.p2 { color:var(--accent); border-color:var(--accent); background:rgba(255,149,0,0.05); }
  .phase-label.p3 { color:var(--accent3); border-color:var(--accent3); background:rgba(127,255,0,0.05); }
  .phase-line { flex:1; height:1px; background:var(--border); }
  .phase-name { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--dim); white-space:nowrap; }

  /* WEEK CARD */
  .week-card {
    background:var(--panel);
    border:1px solid var(--border);
    border-left:3px solid var(--dim);
    margin-bottom:10px;
    cursor:pointer;
    transition:border-color .2s, box-shadow .2s;
    opacity:0;
    animation:fadeUp .4s ease forwards;
  }
  .week-card:hover { box-shadow:var(--glow); }
  .week-card.p1 { border-left-color:var(--accent2); }
  .week-card.p2 { border-left-color:var(--accent); }
  .week-card.p3 { border-left-color:var(--accent3); }
  .week-card.done { opacity:.55; }
  .week-card.done .wtitle h3 { text-decoration:line-through; }

  .week-header { display:flex; align-items:center; gap:14px; padding:14px 18px; }
  .wnum { font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:1; min-width:46px; }
  .p1 .wnum { color:var(--accent2); }
  .p2 .wnum { color:var(--accent); }
  .p3 .wnum { color:var(--accent3); }
  .wtitle { flex:1; }
  .wtitle h3 { font-size:15px; font-weight:600; color:#fff; letter-spacing:.4px; }
  .wtitle p { font-size:11px; color:var(--dim); margin-top:3px; font-family:'Share Tech Mono',monospace; }
  .wcontrols { display:flex; align-items:center; gap:10px; }

  .chk { width:24px; height:24px; border:1px solid var(--dim); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
  .chk:hover { border-color:var(--accent3); }
  .chk.on { background:var(--accent3); border-color:var(--accent3); }
  .chk svg { width:14px; height:14px; }

  .xbtn { font-family:'Share Tech Mono',monospace; font-size:18px; color:var(--dim); background:transparent; border:none; cursor:pointer; transition:color .2s, transform .2s; padding:2px 5px; }
  .xbtn:hover { color:var(--accent); }
  .xbtn.open { transform:rotate(45deg); color:var(--accent); }

  /* BODY */
  .wbody { display:none; padding:0 18px 18px; border-top:1px solid var(--border); }
  .wbody.open { display:block; }

  .baja-note {
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    color:var(--accent);
    background:rgba(255,149,0,0.07);
    border-left:2px solid var(--accent);
    padding:7px 12px;
    margin:14px 0 10px;
    letter-spacing:.5px;
  }

  .topic-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:2px; }
  @media(max-width:580px){ .topic-grid { grid-template-columns:1fr; } }

  .tsec h4 { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:8px; }
  .tsec ul { list-style:none; }
  .tsec ul li { font-size:12.5px; color:var(--text); padding:3px 0 3px 14px; position:relative; line-height:1.4; }
  .tsec ul li::before { content:'▸'; position:absolute; left:0; font-size:9px; color:var(--dim); top:5px; }

  .rtag { display:inline-block; font-family:'Share Tech Mono',monospace; font-size:10px; padding:2px 8px; border:1px solid var(--border); margin:2px 2px 2px 14px; color:var(--dim); }
  .rtag.free { border-color:var(--accent3); color:var(--accent3); }
  .rtag.sw { border-color:var(--accent); color:var(--accent); }
  .rtag.book { border-color:var(--accent2); color:var(--accent2); }

  .proj-box { margin-top:14px; background:rgba(255,149,0,0.04); border:1px dashed var(--border); padding:10px 14px; }
  .proj-box h4 { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:6px; }
  .proj-box p { font-size:12.5px; color:var(--text); line-height:1.5; }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:38px; opacity:0; animation:fadeUp .4s .55s ease forwards; }
  .sbox { background:var(--panel); border:1px solid var(--border); padding:18px; text-align:center; }
  .snum { font-family:'Bebas Neue',sans-serif; font-size:42px; color:var(--accent); text-shadow:var(--glow); }
  .slbl { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:4px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-tag">// Baja SAE · Off-Road Vehicle Engineering</div>
    <h1>CFD <span>ROADMAP</span></h1>
    <div class="header-sub">6-WEEK INTENSIVE · FUNDAMENTALS → BAJA-RELEVANT SIMULATION</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    <div class="progress-label">
      <span>WEEKS DONE: <em id="pCount">0</em>/6</span>
      <em id="pPct">0% COMPLETE</em>
    </div>
  </div>

  <div id="wc"></div>

  <div class="stats-row">
    <div class="sbox"><div class="snum">6</div><div class="slbl">WEEKS</div></div>
    <div class="sbox"><div class="snum">12–15</div><div class="slbl">HRS / WEEK</div></div>
    <div class="sbox"><div class="snum">3</div><div class="slbl">PHASES</div></div>
  </div>

</div>
<script>
const data = [
  {
    id:"W01", phase:"p1",
    title:"Fluid Mechanics + CFD Theory Foundations",
    sub:"Governing Equations · Turbulence · Discretization",
    baja:"Off-road vehicles need CFD for cooling, aerodynamic drag, water fording, and dust ingestion analysis — all built on these fundamentals.",
    topics:[
      "Fluid properties: viscosity, density, compressibility",
      "Reynolds number, laminar vs turbulent flow regimes",
      "Continuity equation — mass conservation",
      "Navier-Stokes momentum equations (physical meaning)",
      "Energy equation — heat transfer basics",
      "Finite Volume Method (FVM) — how CFD solvers work",
      "Truncation error, convergence, stability concepts",
      "Boundary conditions: inlet, outlet, wall, symmetry, periodic",
      "RANS turbulence averaging — what it means physically",
      "k-ε vs k-ω SST — when to use which model"
    ],
    resources:[
      {t:"Versteeg & Malalasekera — Ch 1–4", c:"book"},
      {t:"NPTEL CFD – IIT Kharagpur (free)", c:"free"},
      {t:"CFD Online Wiki – Turbulence Models", c:"free"},
      {t:"Ansys Innovation: Intro to CFD (free)", c:"free"}
    ],
    project:"Derive simplified N-S for 2D channel flow by hand. Calculate Re for Baja cooling airflow at 60 km/h."
  },
  {
    id:"W02", phase:"p1",
    title:"Meshing Theory & Best Practices",
    sub:"Structured · Unstructured · y+ · Inflation Layers · Quality Metrics",
    baja:"Baja simulations — radiator ducts, suspension arm drag, intake geometry — all require well-resolved meshes to get accurate results.",
    topics:[
      "Structured vs unstructured vs hybrid meshing",
      "Mesh quality metrics: skewness, aspect ratio, orthogonality",
      "Boundary layer mesh — inflation layers explained",
      "y+ concept: dimensionless wall distance",
      "y+ calculation formula — how to set first cell height",
      "Wall functions: standard, enhanced, scalable",
      "Local mesh refinement: face sizing, body of influence",
      "Mesh for internal flows (ducts) vs external flows (body)",
      "Common meshing pitfalls and how to fix them",
      "ANSYS Meshing interface — named selections, sizing controls"
    ],
    resources:[
      {t:"ANSYS Meshing User Guide", c:"sw"},
      {t:"Ansys Innovation: Meshing Fundamentals (free)", c:"free"},
      {t:"CFD with a Mission – YouTube", c:"free"},
      {t:"SimScale Mesh Documentation (free)", c:"free"}
    ],
    project:"Mesh a 2D duct cross-section (Baja intake approximation). Achieve skewness < 0.85, target y+ < 5 with inflation layers."
  },
  {
    id:"W03", phase:"p2",
    title:"ANSYS Fluent — Internal Flow Simulations",
    sub:"Pipe Flow · Duct Analysis · SIMPLE Algorithm · Convergence",
    baja:"Internal flow is critical for Baja: engine intake restrictor (38mm rule), cooling duct sizing, and CVT airbox flow all require duct CFD.",
    topics:[
      "Fluent GUI walkthrough: Setup → Solution → Results",
      "Pressure-velocity coupling: SIMPLE & SIMPLEC algorithms",
      "Under-relaxation factors — tuning for convergence",
      "Residual monitoring — what good convergence looks like",
      "Inlet: velocity inlet vs mass flow rate — when to use which",
      "Fully developed flow: periodic BC setup",
      "Post-processing: velocity profiles, pressure drop, wall shear",
      "Validation: compare pipe flow result vs Poiseuille analytical",
      "38mm restrictor CFD — mass flow vs pressure drop curve",
      "Parametric study: vary inlet velocity, compare results"
    ],
    resources:[
      {t:"ANSYS Fluent Getting Started Guide", c:"sw"},
      {t:"Ansys Innovation: Fluent Duct Flow (free)", c:"free"},
      {t:"YouTube: ANSYS Fluent restrictor tutorial", c:"free"},
      {t:"Baja SAE rulebook — Article 5 (Powertrain)", c:"free"}
    ],
    project:"Simulate 38mm intake restrictor flow in ANSYS Fluent. Plot pressure drop vs flow rate. Find choked flow condition."
  },
  {
    id:"W04", phase:"p2",
    title:"ANSYS Fluent — External Flow & Thermal",
    sub:"Aerodynamic Drag · Cooling Radiator · Conjugate Heat Transfer",
    baja:"Baja cars operate in dusty, high-temp off-road conditions. Reducing drag and preventing engine overheating are direct performance and reliability factors.",
    topics:[
      "External flow domain sizing — blockage ratio rules",
      "Freestream farfield boundary conditions",
      "Turbulence intensity and length scale at inlet",
      "Drag coefficient extraction from Fluent",
      "Pressure coefficient (Cp) distribution visualization",
      "Radiator modeled as porous media — resistance coefficients",
      "Conjugate Heat Transfer (CHT) setup in Fluent",
      "Thermal boundary conditions: heat flux, wall temperature",
      "Fan/blower simulation using fan BC or actuator disk",
      "Cooling system: comparing ducted vs open radiator configs"
    ],
    resources:[
      {t:"Fluent Theory Guide – Porous Media", c:"sw"},
      {t:"Ansys Innovation: Heat Transfer in Fluent (free)", c:"free"},
      {t:"SAE Paper: Baja SAE Thermal Management", c:"free"},
      {t:"YouTube: CFD radiator porous media setup", c:"free"}
    ],
    project:"Simulate Baja vehicle frontal area external flow at 60 km/h. Extract Cd. Then model radiator as porous zone — compare cooling mass flow for two duct angles."
  },
  {
    id:"W05", phase:"p3",
    title:"Mesh Independence & Validation",
    sub:"GCI · Richardson Extrapolation · Uncertainty Analysis · OpenFOAM Intro",
    baja:"SAE competition reports and technical scrutineering require justified, validated simulation results — not just pretty contour plots.",
    topics:[
      "Mesh independence study procedure step-by-step",
      "Grid Convergence Index (GCI) method",
      "Richardson extrapolation for error estimation",
      "Effect of y+ choice on turbulence model accuracy",
      "Verification vs validation — key difference",
      "OpenFOAM directory structure: 0, constant, system",
      "blockMesh: building simple geometries in OpenFOAM",
      "simpleFoam solver — steady incompressible flow",
      "fvSolution, fvSchemes, controlDict — key settings",
      "ParaView post-processing: glyphs, streamlines, clip planes"
    ],
    resources:[
      {t:"NASA CFD V&V Guidelines (free)", c:"free"},
      {t:"OpenFOAM User Guide (free)", c:"free"},
      {t:"Jozsef Nagy – OpenFOAM YouTube series", c:"free"},
      {t:"AIAA V&V Guide for CFD (free abstract)", c:"free"}
    ],
    project:"Run 3 mesh refinements on W04 radiator duct case. Compute GCI. Run same case in OpenFOAM simpleFoam and compare results."
  },
  {
    id:"W06", phase:"p3",
    title:"Capstone — Baja SAE CFD Study",
    sub:"Full Workflow · Technical Report · Team Presentation",
    baja:"This is your deliverable: a complete, justified CFD study relevant to your Baja SAE vehicle — intake, cooling, aero drag, or suspension arm drag reduction.",
    topics:[
      "Choose focus: restrictor flow OR cooling system OR body drag",
      "CAD cleanup for CFD: remove small features, create flow volume",
      "Full meshing with documented y+, mesh quality check",
      "Solver setup with justified turbulence model selection",
      "Mesh independence study (min 3 refinement levels)",
      "Design comparison: simulate 2 configurations, compare KPIs",
      "Uncertainty quantification and result confidence statement",
      "Contour plots, velocity vectors, pressure maps — publication quality",
      "Technical report: intro, methodology, results, conclusion",
      "5-minute presentation slide deck for team/competition"
    ],
    resources:[
      {t:"ANSYS Workbench (your install)", c:"sw"},
      {t:"SAE Technical Paper formatting guide (free)", c:"free"},
      {t:"Baja SAE Design Report examples (free)", c:"free"},
      {t:"CFD Post / ParaView for report figures", c:"free"}
    ],
    project:"Complete CFD study with mesh independence, design comparison, and a 4–6 page technical report. Ready for Baja SAE design event presentation."
  }
];

const phases = [
  { id:"p1", label:"PHASE 01", name:"THEORY & MESHING", start:"W01" },
  { id:"p2", label:"PHASE 02", name:"ANSYS FLUENT SIMULATIONS", start:"W03" },
  { id:"p3", label:"PHASE 03", name:"VALIDATION & CAPSTONE", start:"W05" }
];

const wc = document.getElementById("wc");
let done = new Set(JSON.parse(localStorage.getItem("baja_cfd_done")||"[]"));

function save(){ try{localStorage.setItem("baja_cfd_done",JSON.stringify([...done]));}catch(e){} updateProg(); }

function updateProg(){
  const n=done.size, pct=Math.round(n/6*100);
  document.getElementById("pCount").textContent=n;
  document.getElementById("pPct").textContent=pct+"% COMPLETE";
  document.getElementById("pFill").style.width=pct+"%";
}

data.forEach((w,i)=>{
  const ph = phases.find(p=>p.start===w.id);
  if(ph){
    const d=document.createElement("div");
    d.className="phase-header";
    d.style.animationDelay=(0.28+i*0.06)+"s";
    d.innerHTML=`<div class="phase-label ${ph.id}">${ph.label}</div><div class="phase-line"></div><div class="phase-name">${ph.name}</div>`;
    wc.appendChild(d);
  }

  const card=document.createElement("div");
  card.className=`week-card ${w.phase}${done.has(w.id)?" done":""}`;
  card.id="c-"+w.id;
  card.style.animationDelay=(0.32+i*0.06)+"s";

  const topicsHTML=w.topics.map(t=>`<li>${t}</li>`).join("");
  const resHTML=w.resources.map(r=>`<span class="rtag ${r.c}">${r.t}</span>`).join("");
  const isDone=done.has(w.id);

  card.innerHTML=`
    <div class="week-header">
      <div class="wnum">${w.id}</div>
      <div class="wtitle">
        <h3>${w.title}</h3>
        <p>${w.sub}</p>
      </div>
      <div class="wcontrols">
        <button class="chk${isDone?" on":""}" data-id="${w.id}">
          <svg viewBox="0 0 14 14" fill="none" stroke="${isDone?"#0a0800":"currentColor"}" stroke-width="2.2"><polyline points="2,7 5.5,11 12,3"/></svg>
        </button>
        <button class="xbtn" data-id="${w.id}">+</button>
      </div>
    </div>
    <div class="wbody" id="b-${w.id}">
      <div class="baja-note">⬡ BAJA SAE RELEVANCE — ${w.baja}</div>
      <div class="topic-grid">
        <div class="tsec">
          <h4>// 10 Topics This Week</h4>
          <ul>${topicsHTML}</ul>
        </div>
        <div class="tsec">
          <h4>// Resources</h4>
          ${resHTML}
          <div class="proj-box" style="margin-top:14px">
            <h4>// WEEK PROJECT</h4>
            <p>${w.project}</p>
          </div>
        </div>
      </div>
    </div>`;
  wc.appendChild(card);
});

wc.addEventListener("click",e=>{
  const chk=e.target.closest(".chk");
  const xbtn=e.target.closest(".xbtn");
  const hdr=e.target.closest(".week-header");

  if(chk){
    e.stopPropagation();
    const id=chk.dataset.id;
    const card=document.getElementById("c-"+id);
    if(done.has(id)){
      done.delete(id);
      chk.classList.remove("on");
      chk.querySelector("polyline").setAttribute("stroke","currentColor");
      card.classList.remove("done");
    } else {
      done.add(id);
      chk.classList.add("on");
      chk.querySelector("polyline").setAttribute("stroke","#0a0800");
      card.classList.add("done");
    }
    save(); return;
  }

  const toggleId = xbtn ? xbtn.dataset.id : hdr ? hdr.closest(".week-card").id.replace("c-","") : null;
  if(toggleId){
    const body=document.getElementById("b-"+toggleId);
    const btn=document.querySelector(`.xbtn[data-id="${toggleId}"]`);
    body.classList.toggle("open");
    btn.classList.toggle("open");
  }
});

updateProg();
</script>
</body>
</html>
